# Isolated nginx instance for pyportfolios.com static export on :1133.
# Runs alongside (does NOT touch) any nginx on :80.
# Start:  C:\nginx-1.28.3\nginx.exe -p <deploy>/nginx-runtime/ -c <deploy>/nginx-1133.conf
# Stop:   ...same... -s stop     Reload: ...same... -s reload
worker_processes  1;
error_log  C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/logs/error.log warn;
pid        C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx-1.28.3/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    access_log            C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/logs/access.log;
    client_body_temp_path C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/temp/client;
    proxy_temp_path       C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/temp/proxy;
    fastcgi_temp_path     C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/temp/fastcgi;
    uwsgi_temp_path       C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/temp/uwsgi;
    scgi_temp_path        C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/deploy/nginx-runtime/temp/scgi;

    server {
        listen       1133;
        server_name  localhost;

        root  C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/site/out;
        index index.html;

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Portable single-file version, also reachable at /standalone.html
        location = /standalone.html {
            alias C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/pyportfolios.html;
        }

        error_page 404 /404.html;
    }
}
