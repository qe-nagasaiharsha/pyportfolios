# Isolated nginx instance for pyportfolios static export on :5500.
# Paths point at THIS clone (Yonishwari/Desktop/Projects). Runs alongside any nginx on :80.
# Start:  C:\nginx-1.28.3\nginx.exe -p C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/ -c C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-local-5500.conf
# Stop:   ...same... -s stop     Reload: ...same... -s reload
worker_processes  1;
error_log  C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/logs/error.log warn;
pid        C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx-1.28.3/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    access_log            C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/logs/access.log;
    client_body_temp_path C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/temp/client;
    proxy_temp_path       C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/temp/proxy;
    fastcgi_temp_path     C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/temp/fastcgi;
    uwsgi_temp_path       C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/temp/uwsgi;
    scgi_temp_path        C:/Users/Yonishwari/Desktop/Projects/pyportfolios/deploy/nginx-runtime-5500/temp/scgi;

    server {
        listen       5500;
        server_name  localhost;

        root  C:/Users/Yonishwari/Desktop/Projects/pyportfolios/site/out;
        index index.html;

        location / {
            try_files $uri $uri.html $uri/ /index.html;
            # Always revalidate HTML/images so updates show immediately (no stale cache)
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location /_next/static/ {
            # Fingerprinted assets — safe to cache forever
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Portable single-file version, also reachable at /standalone.html
        location = /standalone.html {
            alias C:/Users/Yonishwari/Desktop/Projects/pyportfolios/pyportfolios.html;
        }

        error_page 404 /404.html;
    }
}
