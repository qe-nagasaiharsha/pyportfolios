worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    server {
        listen       8081;
        server_name  localhost;

        # Next.js static export
        root  C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/site/out;
        index index.html;

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Hashed Next assets — cache hard
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Bonus: the portable single-file version at /standalone.html
        location = /standalone.html {
            alias C:/Users/Administrator/Desktop/Yonishwari/download/pyportfolios/pyportfolios.html;
        }

        error_page 404 /404.html;
    }
}
